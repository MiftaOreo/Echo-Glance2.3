<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ECHO-GLANCE — Dual-Layer Eye Blink Messenger IoT Dashboard">
    <title>ECHO-GLANCE - Dashboard</title>
    <link rel="icon" type="image/png" href="assets/img/logo_echo_glance.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
<div class="pending-wrapper">
    <div class="pending-card">
        <div class="pending-icon">⏳</div>
        <h2>Menunggu Verifikasi</h2>
        <p>
            Akun Anda sedang dalam proses verifikasi oleh admin.
            Kami akan memproses Nomor STR Anda dan menghubungi Anda segera setelah verifikasi selesai.
        </p>

        <div class="alert alert-info" style="text-align: left; margin-bottom: var(--space-xl);">
            <span>ℹ️</span>
            <span>Status saat ini: <strong>Menunggu Persetujuan</strong></span>
        </div>

        <div id="statusResult" class="hidden" style="margin-bottom: var(--space-lg);"></div>

        <div class="pending-actions">
            <button class="btn btn-primary" id="btnCheckStatus" onclick="checkStatus()">
                🔄 Cek Status
            </button>
            <a href="index.html" class="btn btn-outline">
                🚪 Logout
            </a>
        </div>
    </div>

    <p style="margin-top: var(--space-xl); color: var(--color-text-light); font-size: 0.8125rem;">
        © 2026 ECHO-GLANCE — KMIPN 2026
    </p>
</div>

<script>
function checkStatus() {
    const btn = document.getElementById('btnCheckStatus');
    const result = document.getElementById('statusResult');

    btn.classList.add('btn-loading');
    btn.disabled = true;

    // Mock fetch for Dummy UI
    new Promise(resolve => setTimeout(() => resolve({ status: 'approved' }), 1000))
        .then(data => {
            btn.classList.remove('btn-loading');
            btn.disabled = false;
            result.classList.remove('hidden');

            if (data.status === 'approved') {
                result.innerHTML = '<div class="alert alert-success"><span>✅</span><span>Akun Anda telah disetujui! Mengalihkan ke dashboard...</span></div>';
                setTimeout(() => {
                    window.location.href = 'dashboard-medis.html';
                }, 2000);
            } else if (data.status === 'rejected') {
                result.innerHTML = '<div class="alert alert-danger"><span>❌</span><span>Maaf, akun Anda ditolak. Hubungi admin untuk informasi lebih lanjut.</span></div>';
            } else {
                result.innerHTML = '<div class="alert alert-warning"><span>⏳</span><span>Status masih menunggu. Silakan cek kembali nanti.</span></div>';
            }
        });
}
</script>

</body>
</html>
